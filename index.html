<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benelux Summer Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for the horizontal filter menu but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">☀️ Kempen Connect</h1>
            <button class="text-gray-500 hover:text-indigo-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </div>

        <div class="max-w-md mx-auto px-4 pb-3 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="filterEvents('all')" class="inline-block px-4 py-1 mr-2 bg-indigo-600 text-white rounded-full text-sm font-medium transition">All</button>
            <button onclick="filterEvents('zomerbar')" class="inline-block px-4 py-1 mr-2 bg-gray-200 text-gray-700 hover:bg-indigo-100 rounded-full text-sm font-medium transition">🍹 Zomerbars</button>
            <button onclick="filterEvents('padel')" class="inline-block px-4 py-1 mr-2 bg-gray-200 text-gray-700 hover:bg-indigo-100 rounded-full text-sm font-medium transition">🎾 Padel</button>
            <button onclick="filterEvents('music')" class="inline-block px-4 py-1 mr-2 bg-gray-200 text-gray-700 hover:bg-indigo-100 rounded-full text-sm font-medium transition">🎸 Music</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20" id="event-feed">
        </main>

    <script src="app.js"></script>
</body>
</html>
