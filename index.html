<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benelux Summer Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Smooth image fading */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased relative">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-indigo-600 tracking-tight">☀️ Kempen Connect</h1>
            <button class="text-gray-400 hover:text-indigo-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3 overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="filterEvents('all')" class="inline-block px-4 py-1.5 mr-2 bg-indigo-600 text-white rounded-full text-sm font-semibold shadow-sm transition">All Events</button>
            <button onclick="filterEvents('zomerbar')" class="inline-block px-4 py-1.5 mr-2 bg-gray-100 text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-full text-sm font-medium transition">🍹 Zomerbars</button>
            <button onclick="filterEvents('padel')" class="inline-block px-4 py-1.5 mr-2 bg-gray-100 text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-full text-sm font-medium transition">🎾 Padel</button>
            <button onclick="filterEvents('music')" class="inline-block px-4 py-1.5 mr-2 bg-gray-100 text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 rounded-full text-sm font-medium transition">🎸 Live Music</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20" id="event-feed"></main>

    <div id="event-modal" class="fixed inset-0 z-[100] hidden bg-black bg-opacity-60 transition-opacity flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-[85vh] sm:h-auto sm:max-h-[90vh] rounded-t-3xl sm:rounded-2xl overflow-hidden flex flex-col transform transition-transform duration-300 translate-y-full shadow-2xl" id="modal-content">
            
            <div class="relative h-56 shrink-0 bg-gray-200">
                <img id="modal-image" src="" alt="Event" class="w-full h-full object-cover">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black bg-opacity-40 text-white rounded-full p-2 hover:bg-opacity-70 backdrop-blur-md transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1">
                <p id="modal-category" class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2"></p>
                <h2 id="modal-title" class="text-2xl font-extrabold text-gray-900 leading-tight mb-4"></h2>
                
                <div class="flex items-center text-gray-600 text-sm mb-3">
                    <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="modal-date" class="font-medium"></span>
                </div>
                <div class="flex items-start text-gray-600 text-sm mb-6">
                    <svg class="w-5 h-5 mr-3 mt-0.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    <span id="modal-location" class="font-medium"></span>
                </div>

                <div class="border-t border-gray-100 pt-5 mb-2">
                    <h3 class="text-lg font-bold text-gray-900 mb-3">About this event</h3>
                    <div id="modal-description" class="text-gray-600 text-sm leading-relaxed space-y-3"></div>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-100 bg-white shrink-0">
                <a id="modal-link" href="#" target="_blank" class="block w-full bg-gray-900 text-white text-center font-bold py-3.5 rounded-xl shadow-lg hover:bg-gray-800 transition transform active:scale-95">
                    Official Event Details →
                </a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
