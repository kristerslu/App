name: Daily Event Scraper

# Run this script every day at 3:00 AM (and allow manual triggers)
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install puppeteer

      - name: Run the Scraper Script
        run: node scraper.js

      - name: Commit and Push the new events.json
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add events.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily event update" && git push)
